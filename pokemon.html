<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokémon Search</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #dc2626, #ea580c);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      text-align: center;
      color: #64748b;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    /* ---------- Search Bar ---------- */
    .search-bar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    .search-bar input {
      flex: 1;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      background: #ffffff;
      color: #1e293b;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-bar input:focus {
      border-color: #dc2626;
    }

    .search-bar button {
      padding: 0.75rem 1.5rem;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #dc2626, #ea580c);
      color: #ffffff;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .search-bar button:hover {
      opacity: 0.85;
    }

    /* ---------- States ---------- */
    .loading {
      text-align: center;
      padding: 3rem;
      font-size: 1.1rem;
      color: #dc2626;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .error {
      text-align: center;
      padding: 2rem;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 12px;
      color: #dc2626;
    }

    .hint {
      text-align: center;
      color: #94a3b8;
      padding: 3rem 1rem;
      font-size: 0.95rem;
    }

    /* ---------- Pokemon Card ---------- */
    .poke-card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 2rem;
      text-align: center;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
    }

    .poke-card img {
      width: 180px;
      height: 180px;
      image-rendering: pixelated;
      filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.15));
    }

    .poke-name {
      font-size: 1.6rem;
      font-weight: 700;
      text-transform: capitalize;
      margin: 0.5rem 0;
      color: #0f172a;
    }

    .poke-id {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }

    /* Types */
    .types {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .type-badge {
      padding: 0.3rem 1rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Stats */
    .stats {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      text-align: left;
    }

    .stat-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .stat-name {
      width: 50px;
      font-size: 0.7rem;
      text-transform: uppercase;
      color: #64748b;
      font-weight: 600;
      text-align: right;
      flex-shrink: 0;
    }

    .stat-bar-bg {
      flex: 1;
      height: 10px;
      background: #e2e8f0;
      border-radius: 5px;
      overflow: hidden;
    }

    .stat-bar {
      height: 100%;
      border-radius: 5px;
      transition: width 0.6s ease;
    }

    .stat-value {
      width: 30px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #334155;
      text-align: right;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Pokémon Search</h1>
    <p class="subtitle">Powered by PokéAPI</p>

    <div class="search-bar">
      <input
        type="text"
        id="search-input"
        placeholder="Enter a Pokémon name (e.g. pikachu)"
      />
      <button id="search-btn">Search</button>
    </div>

    <div id="result">
      <p class="hint">Type a Pokémon name above and hit Search!</p>
    </div>
  </div>

  <script>
    const searchInput = document.getElementById("search-input");
    const searchBtn = document.getElementById("search-btn");
    const resultDiv = document.getElementById("result");

    const TYPE_COLORS = {
      normal: "#a8a878",
      fire: "#f08030",
      water: "#6890f0",
      electric: "#f8d030",
      grass: "#78c850",
      ice: "#98d8d8",
      fighting: "#c03028",
      poison: "#a040a0",
      ground: "#e0c068",
      flying: "#a890f0",
      psychic: "#f85888",
      bug: "#a8b820",
      rock: "#b8a038",
      ghost: "#705898",
      dragon: "#7038f8",
      dark: "#705848",
      steel: "#b8b8d0",
      fairy: "#ee99ac",
    };

    function showLoading() {
      resultDiv.innerHTML = '<div class="loading">Loading...</div>';
    }

    function showError(message) {
      resultDiv.innerHTML = `<div class="error"><p>${message}</p></div>`;
    }

    function renderPokemon(pokemon) {
      const sprite =
        pokemon.sprites.other["official-artwork"].front_default ||
        pokemon.sprites.front_default;

      const typeBadges = pokemon.types
        .map((t) => {
          const color = TYPE_COLORS[t.type.name] || "#888";
          return `<span class="type-badge" style="background:${color}; color:#fff">${t.type.name}</span>`;
        })
        .join("");

      const statBars = pokemon.stats
        .map((s) => {
          const percent = Math.min((s.base_stat / 255) * 100, 100);
          const color =
            s.base_stat >= 100 ? "#16a34a" : s.base_stat >= 50 ? "#ea580c" : "#dc2626";
          const label = s.stat.name
            .replace("special-attack", "SP.ATK")
            .replace("special-defense", "SP.DEF")
            .replace("attack", "ATK")
            .replace("defense", "DEF")
            .replace("speed", "SPD")
            .replace("hp", "HP");

          return `
            <div class="stat-row">
              <span class="stat-name">${label}</span>
              <div class="stat-bar-bg">
                <div class="stat-bar" style="width:${percent}%; background:${color}"></div>
              </div>
              <span class="stat-value">${s.base_stat}</span>
            </div>`;
        })
        .join("");

      resultDiv.innerHTML = `
        <div class="poke-card">
          <img src="${sprite}" alt="${pokemon.name}" />
          <div class="poke-name">${pokemon.name}</div>
          <div class="poke-id">#${String(pokemon.id).padStart(3, "0")}</div>
          <div class="types">${typeBadges}</div>
          <div class="stats">${statBars}</div>
        </div>`;
    }

    async function searchPokemon() {
      const name = searchInput.value.trim().toLowerCase();

      if (!name) {
        showError("Please enter a Pokémon name first!");
        return;
      }

      showLoading();

      try {
        const response = await fetch(
          `https://pokeapi.co/api/v2/pokemon/${encodeURIComponent(name)}`
        );

        if (response.status === 404) {
          throw new Error("NOT_FOUND");
        }

        if (!response.ok) {
          throw new Error(`Server responded with status ${response.status}`);
        }

        const pokemon = await response.json();
        renderPokemon(pokemon);
      } catch (error) {
        if (error.message === "NOT_FOUND") {
          showError(
            `No Pokémon found named "<strong>${name}</strong>". Check the spelling and try again!`
          );
        } else if (error.message === "Failed to fetch") {
          showError(
            "Could not connect to the server. Please check your internet connection."
          );
        } else {
          showError(`Something went wrong: ${error.message}`);
        }
      }
    }

    searchBtn.addEventListener("click", searchPokemon);

    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") searchPokemon();
    });
  </script>
</body>
</html>
