<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokémon Search</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #dc2626, #ea580c);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      text-align: center;
      color: #64748b;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    /* ---------- Search Bar ---------- */
    .search-bar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    .search-bar input {
      flex: 1;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      background: #ffffff;
      color: #1e293b;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-bar input:focus {
      border-color: #dc2626;
    }

    .search-bar button {
      padding: 0.75rem 1.5rem;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #dc2626, #ea580c);
      color: #ffffff;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .search-bar button:hover {
      opacity: 0.85;
    }

    /* ---------- States ---------- */
    .loading {
      text-align: center;
      padding: 3rem;
      font-size: 1.1rem;
      color: #dc2626;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .error {
      text-align: center;
      padding: 2rem;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 12px;
      color: #dc2626;
    }

    .hint {
      text-align: center;
      color: #94a3b8;
      padding: 3rem 1rem;
      font-size: 0.95rem;
    }

    /* ---------- Pokemon Card ---------- */
    .poke-card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 2rem;
      text-align: center;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
    }

    .poke-card img {
      width: 180px;
      height: 180px;
      image-rendering: pixelated;
      filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.15));
    }

    .poke-name {
      font-size: 1.6rem;
      font-weight: 700;
      text-transform: capitalize;
      margin: 0.5rem 0;
      color: #0f172a;
    }

    .poke-id {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }

    /* Types */
    .types {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .type-badge {
      padding: 0.3rem 1rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Stats */
    .stats {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      text-align: left;
    }

    .stat-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .stat-name {
      width: 50px;
      font-size: 0.7rem;
      text-transform: uppercase;
      color: #64748b;
      font-weight: 600;
      text-align: right;
      flex-shrink: 0;
    }

    .stat-bar-bg {
      flex: 1;
      height: 10px;
      background: #e2e8f0;
      border-radius: 5px;
      overflow: hidden;
    }

    .stat-bar {
      height: 100%;
      border-radius: 5px;
      transition: width 0.6s ease;
    }

    .stat-value {
      width: 30px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #334155;
      text-align: right;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Pokémon Search</h1>
    <p class="subtitle">Powered by PokéAPI</p>

    <div class="search-bar">
      <input
        type="text"
        id="search-input"
        placeholder="Enter a Pokémon name (e.g. pikachu)"
      />
      <button id="search-btn">Search</button>
    </div>

    <div id="result">
      <p class="hint">Type a Pokémon name above and hit Search!</p>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
