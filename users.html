<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Users Directory</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      text-align: center;
      color: #94a3b8;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .loading {
      text-align: center;
      padding: 3rem;
      font-size: 1.1rem;
      color: #38bdf8;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .error {
      text-align: center;
      padding: 2rem;
      background: #1e1b2e;
      border: 1px solid #f87171;
      border-radius: 12px;
      color: #fca5a5;
    }

    .error button {
      margin-top: 1rem;
      padding: 0.5rem 1.5rem;
      background: #f87171;
      color: #0f172a;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }

    .user-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .user-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: transform 0.2s, border-color 0.2s;
    }

    .user-card:hover {
      transform: translateY(-2px);
      border-color: #38bdf8;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.1rem;
      color: #0f172a;
      flex-shrink: 0;
    }

    .user-info h3 {
      font-size: 1rem;
      color: #f1f5f9;
    }

    .user-info p {
      font-size: 0.85rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Users Directory</h1>
    <p class="subtitle">Fetched from JSONPlaceholder API</p>
    <div id="app"></div>
  </div>

  <script>
    const app = document.getElementById("app");

    function showLoading() {
      app.innerHTML = '<div class="loading">Loading users...</div>';
    }

    function showError(message) {
      app.innerHTML = `
        <div class="error">
          <p>${message}</p>
          <button onclick="fetchUsers()">Try Again</button>
        </div>`;
    }

    function renderUsers(users) {
      const listHTML = users
        .map((user) => {
          const initials = user.name
            .split(" ")
            .map((w) => w[0])
            .join("");

          return `
            <li class="user-card">
              <div class="avatar">${initials}</div>
              <div class="user-info">
                <h3>${user.name}</h3>
                <p>${user.email} · ${user.company.name}</p>
              </div>
            </li>`;
        })
        .join("");

      app.innerHTML = `<ul class="user-list">${listHTML}</ul>`;
    }

    async function fetchUsers() {
      showLoading();

      try {
        const response = await fetch(
          "https://jsonplaceholder.typicode.com/users"
        );

        if (!response.ok) {
          throw new Error(`Server responded with status ${response.status}`);
        }

        const users = await response.json();
        renderUsers(users);
      } catch (error) {
        showError(
          error.message === "Failed to fetch"
            ? "Could not connect to the server. Please check your internet."
            : `Something went wrong: ${error.message}`
        );
      }
    }

    fetchUsers();
  </script>
</body>
</html>
